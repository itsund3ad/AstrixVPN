name: CI Build
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e astrix-client
          pip install -e astrix-server
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check astrix-client astrix-server

      - name: Typecheck with mypy
        run: mypy astrix-client astrix_server --ignore-missing-imports
        continue-on-error: true

  build-linux:
    name: Build Linux (smoke test)
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e astrix-client
          pip install -e astrix-server

      - name: Build client (smoke)
        run: python astrix-client/build_exe.py
        timeout-minutes: 10

      - name: Build server (smoke)
        run: python astrix-server/build_exe.py
        timeout-minutes: 10

      - name: Smoke test
        run: |
          CLIENT=$(ls dist/astrix-client-v* 2>/dev/null | head -1)
          SERVER=$(ls dist/astrix-server-v* 2>/dev/null | head -1)
          if [ -z "$CLIENT" ]; then echo "Missing client binary"; exit 1; fi
          if [ -z "$SERVER" ]; then echo "Missing server binary"; exit 1; fi
          chmod +x "$CLIENT" "$SERVER"
          "$CLIENT" --version
          "$SERVER" --version
